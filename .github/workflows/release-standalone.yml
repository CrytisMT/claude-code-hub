name: Build & Publish Standalone Image

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag suffix (e.g. "1.2.3"). Will produce: <version>-standalone and latest-standalone'
        required: false
        default: ''
  push:
    branches:
      - main
    paths:
      # Only rebuild when standalone-related files change
      - 'deploy/Dockerfile.standalone'
      - 'deploy/standalone/**'
      - 'src/**'
      - 'package.json'
      - 'bun.lockb'

permissions:
  contents: read
  packages: write

jobs:
  build-standalone:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Determine image version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            VERSION="${{ github.event.inputs.tag }}"
          else
            VERSION=$(cat VERSION | tr -d '[:space:]')
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Image version: ${VERSION}"

      - name: Prepare image names
        id: image
        run: |
          GHCR_IMAGE=$(echo "ghcr.io/${{ github.repository_owner }}/claude-code-hub" | tr '[:upper:]' '[:lower:]')
          echo "ghcr_image=${GHCR_IMAGE}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push standalone image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./deploy/Dockerfile.standalone
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            APP_VERSION=${{ steps.version.outputs.version }}
          tags: |
            ${{ steps.image.outputs.ghcr_image }}:${{ steps.version.outputs.version }}-standalone
            ${{ steps.image.outputs.ghcr_image }}:latest-standalone
          labels: |
            org.opencontainers.image.title=claude-code-hub-standalone
            org.opencontainers.image.description=All-in-one image with embedded PostgreSQL (no Redis)
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
          cache-from: type=gha,scope=standalone
          cache-to: type=gha,mode=max,scope=standalone
